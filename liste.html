<title>Liste</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f2f2f7;min-height:100vh;overflow-x:hidden}
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
#login-screen h1{font-size:24px;font-weight:600;color:#000;margin-bottom:6px}
#login-screen p{font-size:14px;color:#8e8e93;margin-bottom:2rem}
.login-box{width:100%;max-width:320px;background:#fff;border-radius:16px;padding:1.5rem;display:flex;flex-direction:column;gap:12px}
.login-box input{padding:12px 14px;border:1px solid #e5e5ea;border-radius:10px;font-size:16px;color:#000;outline:none;background:#f2f2f7}
.login-box input:focus{border-color:#007aff;background:#fff}
.login-box button{padding:13px;border-radius:10px;border:none;background:#007aff;color:#fff;font-size:16px;font-weight:600;cursor:pointer}
.login-error{font-size:13px;color:#ff3b30;text-align:center;min-height:18px}
#app{max-width:420px;margin:0 auto;padding:3rem 0 3rem;display:none}
.topbar{padding:0 1.25rem 1.25rem;display:flex;align-items:flex-end;justify-content:space-between}
.topbar-left h1{font-size:28px;font-weight:600;color:#000;line-height:1.1}
.topbar-left p{font-size:13px;color:#8e8e93;margin-top:3px}
.top-right{display:flex;gap:8px;align-items:center}
.settings-btn,.logout-btn{width:36px;height:36px;border-radius:50%;border:none;background:#e5e5ea;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#3c3c43;font-size:17px;flex-shrink:0}
.logout-btn:hover{background:#ffe5e5;color:#ff3b30}
.settings-btn:hover{background:#d1d1d6}
.sync-indicator{font-size:11px;color:#8e8e93;padding:0 1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:5px;min-height:18px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#34c759;flex-shrink:0}
.sync-dot.syncing{background:#ff9500}
.sync-dot.error{background:#ff3b30}
.tabs-scroll{padding:0 1.25rem;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;border:none;background:#e5e5ea;color:#3c3c43;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.tab:hover{background:#d1d1d6}
.tab.active{background:#007aff;color:#fff}
.tab.active .tbadge{background:#0051a8;color:#b3d1ff}
.tbadge{font-size:11px;font-weight:500;padding:1px 7px;border-radius:10px;background:#fff;color:#3c3c43}
.task-list{padding:0 1.25rem;display:flex;flex-direction:column;gap:6px}
.sec-label{padding:0 1.25rem;font-size:11px;font-weight:600;color:#8e8e93;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;margin-top:1.25rem}
.empty-state{text-align:center;padding:2.5rem 1rem 1.5rem}
.empty-state p{font-size:14px;color:#8e8e93}
.add-ghost{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px dashed #c7c7cc;border-radius:12px;cursor:pointer;margin:6px 1.25rem 0;color:#8e8e93}
.add-ghost:hover{border-color:#007aff;color:#007aff;background:#f0f6ff}
.add-ghost span{font-size:15px}
.add-ghost .add-icon{width:23px;height:23px;border-radius:50%;border:1.5px dashed #c7c7cc;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.add-ghost:hover .add-icon{border-color:#007aff}
.add-inline{display:none;align-items:center;gap:8px;padding:9px 14px;background:#fff;border:1.5px solid #007aff;border-radius:12px;margin:6px 1.25rem 0}
.add-inline.open{display:flex}
.add-inline input{flex:1;border:none;background:transparent;font-size:15px;color:#000;outline:none}
.add-inline input::placeholder{color:#8e8e93}
.confirm-btn{width:28px;height:28px;border-radius:8px;border:none;background:#007aff;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.cancel-btn{width:28px;height:28px;border-radius:8px;border:1px solid #c7c7cc;background:transparent;color:#8e8e93;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0}
.done-toggle{display:flex;align-items:center;gap:8px;padding:0 1.25rem;margin-top:1rem;cursor:pointer;color:#8e8e93;font-size:13px;background:none;border:none;width:100%;text-align:left}
.done-toggle:hover{color:#3c3c43}
/* SWIPE */
.swipe-wrap{position:relative;border-radius:12px;overflow:hidden}
.swipe-bg-right{position:absolute;inset:0;background:#34c759;border-radius:12px;display:flex;align-items:center;padding-left:16px}
.swipe-bg-right .check-icon{font-size:22px;color:#fff;opacity:0;transition:opacity .1s}
.swipe-bg-right .check-icon.visible{opacity:1}
.swipe-actions-right{position:absolute;top:0;right:0;bottom:0;display:flex;align-items:center;padding-right:10px;gap:6px;transition:opacity .1s}
.swipe-actions-right.hidden{opacity:0;pointer-events:none}
.swipe-action-btn{width:44px;height:44px;border-radius:10px;border:none;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;flex-shrink:0}
.sa-edit{background:#007aff;color:#fff}
.sa-move{background:#ff9500;color:#fff}
.task-card{display:flex;align-items:center;gap:12px;padding:13px 14px;background:#fff;border-radius:12px;position:relative;z-index:1;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;will-change:transform}
.task-card.done-card{background:#f2f2f7}
.chk{width:23px;height:23px;border-radius:50%;border:1.5px solid #c7c7cc;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;-webkit-tap-highlight-color:transparent}
.chk:hover:not(.on){border-color:#007aff;background:#e5f0ff}
.chk.on{background:#34c759;border-color:#34c759;color:#fff}
.task-text{flex:1;font-size:15px;color:#000;pointer-events:none}
.task-text.struck{text-decoration:line-through;color:#8e8e93}
.del{width:28px;height:28px;border:none;background:transparent;cursor:pointer;color:#c7c7cc;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px;flex-shrink:0}
.del:hover{background:#ffe5e5;color:#ff3b30}
.task-edit-input{flex:1;border:none;background:transparent;font-size:15px;color:#000;outline:none;padding:0}
/* CONTEXT MENU */
.ctx-menu{position:fixed;background:#fff;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,0.18);z-index:100;min-width:190px;overflow:hidden;display:none}
.ctx-menu.open{display:block}
.ctx-item{display:flex;align-items:center;gap:10px;padding:11px 16px;font-size:15px;color:#000;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-bottom:0.5px solid #f2f2f7}
.ctx-item:last-child{border-bottom:none}
.ctx-item i{font-size:17px;width:20px;text-align:center;color:#007aff}
.ctx-item.danger{color:#ff3b30}
.ctx-item.danger i{color:#ff3b30}
.ctx-item.move-item i{color:#ff9500}
.ctx-overlay{position:fixed;inset:0;z-index:99;display:none}
.ctx-overlay.open{display:block}
/* MOVE SHEET */
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:none}
.sheet-bg.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;padding:1rem 1rem 2.5rem;z-index:51;transform:translateY(100%);transition:transform .25s ease}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:0 auto .75rem}
.sheet-task-name{font-size:15px;font-weight:500;color:#000;padding:8px 4px 12px;border-bottom:0.5px solid #e5e5ea;margin-bottom:8px}
.sheet-label{font-size:11px;font-weight:600;color:#8e8e93;text-transform:uppercase;letter-spacing:.06em;padding:0 4px 8px}
.sheet-item{display:flex;align-items:center;gap:12px;padding:13px 4px;font-size:16px;color:#000;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-bottom:0.5px solid #f2f2f7}
.sheet-item:last-child{border-bottom:none}
.sheet-item i{font-size:18px;color:#ff9500;width:24px;text-align:center}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:10;display:none;align-items:flex-end;justify-content:center;cursor:pointer}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:1.25rem;width:100%;max-width:420px;padding-bottom:2.5rem;cursor:default}
.modal-handle{width:36px;height:4px;background:#c7c7cc;border-radius:2px;margin:0 auto 1.25rem}
.modal h2{font-size:17px;font-weight:600;color:#000;margin-bottom:1rem}
.cat-item{display:flex;align-items:center;padding:11px 0;border-bottom:0.5px solid #e5e5ea;cursor:grab;gap:8px}
.cat-item.dragging{opacity:0.4}
.cat-item.drag-over{border-top:2px solid #007aff}
.drag-handle{color:#c7c7cc;font-size:18px;cursor:grab;padding:0 4px;flex-shrink:0}
.cat-item span{flex:1;font-size:15px;color:#000}
.cat-del-btn{width:28px;height:28px;border:none;background:none;cursor:pointer;color:#c7c7cc;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:15px}
.cat-del-btn:hover{background:#ffe5e5;color:#ff3b30}
.modal-add-row{display:flex;gap:8px;margin-top:1rem}
.modal-add-row input{flex:1;padding:10px 12px;border:1px solid #c7c7cc;border-radius:10px;font-size:15px;background:#f2f2f7;color:#000;outline:none}
.modal-add-row input:focus{border-color:#007aff}
.modal-add-row button{padding:10px 16px;border-radius:10px;border:none;background:#007aff;color:#fff;font-size:15px;cursor:pointer;font-weight:500}
.modal-close-btn{margin-top:.75rem;width:100%;padding:13px;border:none;border-radius:12px;background:#f2f2f7;color:#000;font-size:15px;cursor:pointer;font-weight:500}
</style>
</head>
<body>

<div id="login-screen">
  <svg style="width:72px;height:72px;margin-bottom:1.5rem" viewBox="0 0 72 72" fill="none">
    <circle cx="36" cy="36" r="30" stroke="#007aff" stroke-width="5"/>
    <polyline points="22,36 31,46 51,24" stroke="#007aff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <h1>Le mie liste</h1>
  <p>Inserisci la password per accedere</p>
  <div class="login-box">
    <input id="pwd-input" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">Accedi</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <h1 id="view-title">Casa</h1>
      <p id="view-sub"></p>
    </div>
    <div class="top-right">
      <button class="settings-btn" onclick="openModal()"><i class="ti ti-layout-list"></i></button>
      <button class="logout-btn" onclick="doLogout()"><i class="ti ti-lock"></i></button>
    </div>
  </div>
  <div class="sync-indicator">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Sincronizzato</span>
  </div>
  <div class="tabs-scroll" id="tabs"></div>
  <div class="sec-label" id="sec-label-todo"></div>
  <div class="task-list" id="task-list-todo"></div>
  <div class="add-ghost" id="add-ghost" onclick="openInline()">
    <div class="add-icon"><i class="ti ti-plus"></i></div>
    <span>Nuovo task</span>
  </div>
  <div class="add-inline" id="add-inline">
    <input id="new-task" type="text" placeholder="Scrivi il task…" onkeydown="if(event.key==='Enter')addTask();if(event.key==='Escape')closeInline()"/>
    <button class="cancel-btn" onclick="closeInline()"><i class="ti ti-x"></i></button>
    <button class="confirm-btn" onclick="addTask()"><i class="ti ti-arrow-up"></i></button>
  </div>
  <button class="done-toggle" id="done-toggle" onclick="toggleDoneSection()">
    <i class="ti ti-chevron-right" id="done-chevron"></i>
    <span id="done-toggle-label">Completati</span>
  </button>
  <div id="done-section" style="display:none">
    <div class="task-list" style="margin-top:8px" id="task-list-done"></div>
  </div>
</div>

<!-- Context menu (Mac) -->
<div class="ctx-overlay" id="ctx-overlay" onclick="closeCtx()"></div>
<div class="ctx-menu" id="ctx-menu">
  <button class="ctx-item" id="ctx-edit-btn"><i class="ti ti-pencil"></i> Modifica</button>
  <button class="ctx-item move-item" id="ctx-move-btn"><i class="ti ti-folders"></i> Sposta in…</button>
  <button class="ctx-item danger" id="ctx-del-btn"><i class="ti ti-trash"></i> Elimina</button>
</div>

<!-- Move sheet -->
<div class="sheet-bg" id="sheet-bg" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-task-name" id="sheet-task-name"></div>
  <div class="sheet-label">Sposta in</div>
  <div id="sheet-destinations"></div>
</div>

<!-- Settings modal -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Gestisci schede</h2>
    <div id="cat-list"></div>
    <div class="modal-add-row">
      <input id="new-cat" type="text" placeholder="Nome nuova scheda…" onkeydown="if(event.key==='Enter')addCat()"/>
      <button onclick="addCat()">Aggiungi</button>
    </div>
    <button class="modal-close-btn" onclick="closeModal()">Chiudi</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://kptyfknmwalpbiovsqgt.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwdHlma25td2FscGJpb3ZzcWd0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MDEyMTUsImV4cCI6MjA5NjQ3NzIxNX0.aOrLUXnTdb3zMdxjtV2_jluSwf7P_gvcG9ttGVfDt9U';
const PASSWORD_HASH='147701e69dce68215106b228d9c8824fefd8cd71e06b386192bb121ed8d929c1';
const COMPLETE_THRESHOLD=200;
const LEFT_THRESHOLD=60;

async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
async function doLogin(){const v=document.getElementById('pwd-input').value;const h=await sha256(v);if(h===PASSWORD_HASH){localStorage.setItem('liste_auth',h);showApp();}else{document.getElementById('login-error').textContent='Password errata.';document.getElementById('pwd-input').value='';}}
function doLogout(){localStorage.removeItem('liste_auth');document.getElementById('app').style.display='none';document.getElementById('login-screen').style.display='flex';document.getElementById('pwd-input').value='';document.getElementById('login-error').textContent='';}
function showApp(){document.getElementById('login-screen').style.display='none';document.getElementById('app').style.display='block';loadFromSupabase();}
function checkAuth(){if(localStorage.getItem('liste_auth')===PASSWORD_HASH)showApp();}

let cats=['Casa','Lavoro','Macchina','Personale'];
let tasks={Casa:[],Lavoro:[],Macchina:[],Personale:[]};
let cur='Casa',doneOpen=false,syncTimeout=null;
let activeSwipe=null;
let ctxRealIdx=null,ctxIsDone=false,ctxDisplayIdx=null,ctxTextEl=null;
let moveTaskIdx=null,moveIsDone=false;

function setSyncStatus(s,l){document.getElementById('sync-dot').className='sync-dot'+(s!=='ok'?' '+s:'');document.getElementById('sync-label').textContent=l;}
async function loadFromSupabase(){setSyncStatus('syncing','Caricamento…');try{const res=await fetch(SUPABASE_URL+'/rest/v1/lists?id=eq.1&select=data',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});if(!res.ok)throw new Error();const rows=await res.json();if(rows.length>0&&rows[0].data&&Object.keys(rows[0].data).length>0){const d=rows[0].data;if(d.cats)cats=d.cats;if(d.tasks)tasks=d.tasks;cats.forEach(c=>{if(!tasks[c])tasks[c]=[];});}setSyncStatus('ok','Sincronizzato');}catch(e){setSyncStatus('error','Errore di connessione');}render();}
async function saveToSupabase(){setSyncStatus('syncing','Salvataggio…');try{const res=await fetch(SUPABASE_URL+'/rest/v1/lists?id=eq.1',{method:'PATCH',headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},body:JSON.stringify({data:{cats,tasks}})});if(!res.ok)throw new Error();setSyncStatus('ok','Sincronizzato');}catch(e){setSyncStatus('error','Errore salvataggio');}}
function scheduleSave(){clearTimeout(syncTimeout);syncTimeout=setTimeout(saveToSupabase,800);}
function pending(cat){return(tasks[cat]||[]).filter(t=>!t.done).length;}
function doneCount(cat){return(tasks[cat]||[]).filter(t=>t.done).length;}

function resetAllSwipes(except){
  document.querySelectorAll('.task-card').forEach(c=>{if(c!==except){c.style.transition='transform .2s ease';c.style.transform='translateX(0)';}});
  if(!except)activeSwipe=null;
}

// CONTEXT MENU (Mac only)
function openCtx(e,ri,isDone,dispIdx,textEl){
  e.preventDefault();
  ctxRealIdx=ri; ctxIsDone=isDone; ctxDisplayIdx=dispIdx; ctxTextEl=textEl;
  const menu=document.getElementById('ctx-menu');
  document.getElementById('ctx-overlay').classList.add('open');
  menu.classList.add('open');
  const x=Math.min(e.clientX,window.innerWidth-200);
  const y=Math.min(e.clientY,window.innerHeight-140);
  menu.style.left=x+'px'; menu.style.top=y+'px';
}
function closeCtx(){document.getElementById('ctx-menu').classList.remove('open');document.getElementById('ctx-overlay').classList.remove('open');}

document.getElementById('ctx-edit-btn').onclick=()=>{
  if(ctxTextEl&&ctxRealIdx!==null)startEdit(ctxRealIdx,ctxTextEl);
  closeCtx();
};
document.getElementById('ctx-move-btn').onclick=()=>{
  closeCtx();
  if(ctxDisplayIdx!==null)openSheet(ctxDisplayIdx,ctxIsDone);
};
document.getElementById('ctx-del-btn').onclick=()=>{
  if(ctxRealIdx!==null){tasks[cur].splice(ctxRealIdx,1);scheduleSave();render();}
  closeCtx();
};

// MOVE SHEET
function openSheet(dispIdx,isDone){
  moveTaskIdx=dispIdx; moveIsDone=isDone;
  const list=isDone?(tasks[cur]||[]).filter(t=>t.done):(tasks[cur]||[]).filter(t=>!t.done);
  const t=list[dispIdx]; if(!t)return;
  document.getElementById('sheet-task-name').textContent=t.text;
  const dest=document.getElementById('sheet-destinations'); dest.innerHTML='';
  cats.filter(c=>c!==cur||isDone).forEach(c=>{
    const btn=document.createElement('button');
    btn.className='sheet-item';
    btn.innerHTML='<i class="ti ti-folder"></i> '+c;
    btn.onclick=()=>moveTask(c);
    dest.appendChild(btn);
  });
  document.getElementById('sheet-bg').classList.add('open');
  setTimeout(()=>document.getElementById('sheet').classList.add('open'),10);
}
function closeSheet(){document.getElementById('sheet').classList.remove('open');document.getElementById('sheet-bg').classList.remove('open');moveTaskIdx=null;resetAllSwipes();}
function moveTask(destCat){
  if(moveTaskIdx===null)return;
  const list=moveIsDone?(tasks[cur]||[]).filter(t=>t.done):(tasks[cur]||[]).filter(t=>!t.done);
  const t=list[moveTaskIdx]; if(!t){closeSheet();return;}
  const ri=(tasks[cur]||[]).indexOf(t);
  tasks[cur].splice(ri,1); t.done=false;
  if(!tasks[destCat])tasks[destCat]=[];
  tasks[destCat].unshift(t);
  closeSheet(); scheduleSave(); render();
}

function startEdit(ri,textEl){
  resetAllSwipes();
  const oldText=tasks[cur][ri].text;
  const inp=document.createElement('input');
  inp.className='task-edit-input'; inp.value=oldText;
  textEl.replaceWith(inp); inp.focus(); inp.select();
  function save(){const v=inp.value.trim();if(v&&v!==oldText){tasks[cur][ri].text=v;scheduleSave();}render();}
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')save();if(e.key==='Escape')render();});
  inp.addEventListener('blur',save);
}

function addSwipe(card,ri,isDone,bgEl,checkIconEl,rightActEl){
  let startX=0,startY=0,curX=0,dragging=false,locked=false,dir=null;

  function onStart(x,y){
    startX=x; startY=y; curX=0; dragging=true; locked=false; dir=null;
    card.style.transition='none';
  }
  function onMove(x,y){
    if(!dragging)return;
    const dx=x-startX, dy=y-startY;
    if(!locked){
      if(Math.abs(dx)<5&&Math.abs(dy)<5)return;
      if(Math.abs(dy)>Math.abs(dx)){dragging=false;return;}
      locked=true; dir=dx<0?'left':'right';
      if(activeSwipe&&activeSwipe!==card)resetAllSwipes(card);
    }
    if(dir==='left'&&dx>0)return;
    if(dir==='right'&&(dx<0||isDone))return;
    curX=dx;
    if(dir==='right'){
      rightActEl.classList.add('hidden');
      const pct=Math.min(curX/COMPLETE_THRESHOLD,1);
      card.style.transform='translateX('+curX+'px)';
      bgEl.style.opacity=Math.min(pct*1.5,1);
      checkIconEl.classList.toggle('visible', pct>0.5);
    } else {
      rightActEl.classList.remove('hidden');
      const clamped=Math.max(-130,curX);
      card.style.transform='translateX('+clamped+'px)';
    }
  }
  function onEnd(){
    if(!dragging||!locked){dragging=false;return;}
    dragging=false;
    card.style.transition='transform .2s ease';
    if(dir==='left'&&curX<-LEFT_THRESHOLD){
      card.style.transform='translateX(-130px)';
      activeSwipe=card;
    } else if(dir==='right'&&!isDone&&curX>=COMPLETE_THRESHOLD){
      card.style.transition='transform .25s ease';
      card.style.transform='translateX('+window.innerWidth+'px)';
      setTimeout(()=>{doComplete(ri);},250);
    } else {
      card.style.transform='translateX(0)';
      bgEl.style.opacity=0;
      checkIconEl.classList.remove('visible');
      rightActEl.classList.remove('hidden');
      activeSwipe=null;
    }
  }

  // Touch only
  card.addEventListener('touchstart',e=>{onStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  card.addEventListener('touchmove',e=>{if(locked)e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  card.addEventListener('touchend',()=>onEnd());
}

function doComplete(ri){
  if(tasks[cur][ri])tasks[cur][ri].done=!tasks[cur][ri].done;
  if(navigator.vibrate)navigator.vibrate(20);
  scheduleSave(); render();
}

function makeCard(t,dispIdx,isDone){
  const wrap=document.createElement('div');
  wrap.className='swipe-wrap';

  // Green bg for right swipe
  const bgEl=document.createElement('div');
  bgEl.className='swipe-bg-right';
  bgEl.style.opacity=0;
  const checkIconEl=document.createElement('i');
  checkIconEl.className='ti ti-check check-icon';
  bgEl.appendChild(checkIconEl);
  wrap.appendChild(bgEl);

  // Right action buttons (left swipe reveals)
  const rightAct=document.createElement('div');
  rightAct.className='swipe-actions-right';
  const editBtn=document.createElement('button');
  editBtn.className='swipe-action-btn sa-edit';
  editBtn.innerHTML='<i class="ti ti-pencil"></i>';
  const moveBtn=document.createElement('button');
  moveBtn.className='swipe-action-btn sa-move';
  moveBtn.innerHTML='<i class="ti ti-folders"></i>';
  rightAct.appendChild(editBtn);
  rightAct.appendChild(moveBtn);
  wrap.appendChild(rightAct);

  const ri=(tasks[cur]||[]).indexOf(t);
  const card=document.createElement('div');
  card.className='task-card'+(isDone?' done-card':'');

  const chkBtn=document.createElement('button');
  chkBtn.className='chk'+(isDone?' on':'');
  chkBtn.innerHTML=isDone?'<i class="ti ti-check"></i>':'';
  chkBtn.onclick=e=>{e.stopPropagation();if(activeSwipe===card){resetAllSwipes();return;}toggle(ri);};

  const textEl=document.createElement('span');
  textEl.className='task-text'+(isDone?' struck':'');
  textEl.textContent=t.text;

  const delBtn=document.createElement('button');
  delBtn.className='del';
  delBtn.innerHTML='<i class="ti ti-trash"></i>';
  delBtn.onclick=e=>{e.stopPropagation();del(ri);};

  card.appendChild(chkBtn); card.appendChild(textEl); card.appendChild(delBtn);
  wrap.appendChild(card);

  // Button actions
  editBtn.onclick=()=>{startEdit(ri,textEl);};
  moveBtn.onclick=()=>{openSheet(dispIdx,isDone);};

  // Tap on swiped card → reset
  card.addEventListener('click',e=>{if(activeSwipe===card){e.preventDefault();e.stopPropagation();resetAllSwipes();return;}});

  // Mac right click → context menu
  card.addEventListener('contextmenu',e=>openCtx(e,ri,isDone,dispIdx,textEl));

  // Touch swipe (iPhone)
  addSwipe(card,ri,isDone,bgEl,checkIconEl,rightAct);

  return wrap;
}

function render(){
  const p=pending(cur),d=doneCount(cur);
  document.getElementById('view-title').textContent=cur;
  document.getElementById('view-sub').textContent=p===0&&d===0?'Nessun task':p===0?'Tutto fatto!':p===1?'1 task in sospeso':p+' task in sospeso';
  const tw=document.getElementById('tabs'); tw.innerHTML='';
  cats.forEach(c=>{
    const p2=pending(c);
    const btn=document.createElement('button');
    btn.className='tab'+(c===cur?' active':'');
    btn.innerHTML=c+(p2>0?'<span class="tbadge">'+p2+'</span>':'');
    btn.onclick=()=>{cur=c;doneOpen=false;closeInline();resetAllSwipes();render();};
    tw.appendChild(btn);
  });
  const todoItems=(tasks[cur]||[]).filter(t=>!t.done);
  const doneItems=(tasks[cur]||[]).filter(t=>t.done);
  document.getElementById('sec-label-todo').textContent=todoItems.length>0?'In sospeso':'';
  const tl=document.getElementById('task-list-todo'); tl.innerHTML='';
  if(todoItems.length===0)tl.innerHTML='<div class="empty-state"><p>Nessun task. Aggiungine uno!</p></div>';
  else todoItems.forEach((t,i)=>tl.appendChild(makeCard(t,i,false)));
  const dt=document.getElementById('done-toggle');
  if(doneItems.length>0){dt.style.display='flex';document.getElementById('done-toggle-label').textContent='Completati ('+doneItems.length+')';document.getElementById('done-chevron').className='ti ti-chevron-'+(doneOpen?'down':'right');}
  else dt.style.display='none';
  document.getElementById('done-section').style.display=doneOpen?'block':'none';
  const dl=document.getElementById('task-list-done'); dl.innerHTML='';
  doneItems.forEach((t,i)=>dl.appendChild(makeCard(t,i,true)));
}

function toggle(i){tasks[cur][i].done=!tasks[cur][i].done;scheduleSave();render();}
function del(i){tasks[cur].splice(i,1);scheduleSave();render();}
function addTask(){const inp=document.getElementById('new-task');const txt=inp.value.trim();if(!txt)return;if(!tasks[cur])tasks[cur]=[];tasks[cur].unshift({text:txt,done:false});inp.value='';closeInline();scheduleSave();render();}
function openInline(){document.getElementById('add-ghost').style.display='none';document.getElementById('add-inline').classList.add('open');setTimeout(()=>document.getElementById('new-task').focus(),50);}
function closeInline(){document.getElementById('add-ghost').style.display='flex';document.getElementById('add-inline').classList.remove('open');document.getElementById('new-task').value='';}
function toggleDoneSection(){doneOpen=!doneOpen;render();}
function openModal(){renderCatList();document.getElementById('modal-bg').classList.add('open');}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');render();}

// REORDER schede (touch + mouse)
let dragSrcIdx=null, dragGhost=null, dragTargetIdx=null;

function renderCatList(){
  const cl=document.getElementById('cat-list'); cl.innerHTML='';
  cats.forEach((c,i)=>{
    const row=document.createElement('div');
    row.className='cat-item';
    row.dataset.idx=i;
    const handle=document.createElement('span');
    handle.className='drag-handle';
    handle.innerHTML='<i class="ti ti-grip-vertical"></i>';
    const label=document.createElement('span');
    label.textContent=c;
    const delBtn=document.createElement('button');
    delBtn.className='cat-del-btn';
    delBtn.innerHTML='<i class="ti ti-x"></i>';
    delBtn.onclick=()=>delCat(i);
    row.appendChild(handle); row.appendChild(label); row.appendChild(delBtn);

    // Mouse drag (Mac)
    row.draggable=true;
    row.addEventListener('dragstart',e=>{dragSrcIdx=i;row.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.classList.remove('dragging');document.querySelectorAll('.cat-item').forEach(r=>r.classList.remove('drag-over'));});
    row.addEventListener('dragover',e=>{e.preventDefault();row.classList.add('drag-over');});
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault(); row.classList.remove('drag-over');
      const destIdx=parseInt(row.dataset.idx);
      if(dragSrcIdx===null||dragSrcIdx===destIdx)return;
      const moved=cats.splice(dragSrcIdx,1)[0];
      cats.splice(destIdx,0,moved);
      dragSrcIdx=null; scheduleSave(); renderCatList();
    });

    // Touch drag (iPhone)
    handle.addEventListener('touchstart',e=>{
      e.stopPropagation();
      dragSrcIdx=i;
      const touch=e.touches[0];
      row.classList.add('dragging');
      // ghost
      dragGhost=row.cloneNode(true);
      dragGhost.style.cssText='position:fixed;left:0;right:0;opacity:0.85;z-index:200;background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);pointer-events:none;padding:11px 0;';
      dragGhost.style.top=(row.getBoundingClientRect().top)+'px';
      document.body.appendChild(dragGhost);
    },{passive:true});

    handle.addEventListener('touchmove',e=>{
      if(dragSrcIdx===null)return;
      e.preventDefault();
      const touch=e.touches[0];
      dragGhost.style.top=(touch.clientY-22)+'px';
      // find target row
      const rows=[...document.querySelectorAll('#cat-list .cat-item')];
      rows.forEach(r=>r.classList.remove('drag-over'));
      const target=rows.find(r=>{
        const rect=r.getBoundingClientRect();
        return touch.clientY>=rect.top && touch.clientY<=rect.bottom;
      });
      if(target&&target!==row){target.classList.add('drag-over');dragTargetIdx=parseInt(target.dataset.idx);}
      else dragTargetIdx=null;
    },{passive:false});

    handle.addEventListener('touchend',()=>{
      if(dragGhost){dragGhost.remove();dragGhost=null;}
      document.querySelectorAll('.cat-item').forEach(r=>{r.classList.remove('dragging');r.classList.remove('drag-over');});
      if(dragSrcIdx!==null&&dragTargetIdx!==null&&dragSrcIdx!==dragTargetIdx){
        const moved=cats.splice(dragSrcIdx,1)[0];
        cats.splice(dragTargetIdx,0,moved);
        scheduleSave();
      }
      dragSrcIdx=null; dragTargetIdx=null;
      renderCatList();
    });

    cl.appendChild(row);
  });
}
function addCat(){const inp=document.getElementById('new-cat');const txt=inp.value.trim();if(!txt||cats.includes(txt))return;cats.push(txt);tasks[txt]=[];inp.value='';scheduleSave();renderCatList();}
function delCat(i){const c=cats[i];if(cats.length<=1)return;cats.splice(i,1);delete tasks[c];if(cur===c)cur=cats[0];scheduleSave();renderCatList();}

document.addEventListener('click',e=>{if(activeSwipe&&!activeSwipe.parentElement.contains(e.target))resetAllSwipes();});

checkAuth();
</script>
</body>
</html>
